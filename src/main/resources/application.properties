spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:nasa_challenge}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.flyway.enabled=true

asteral.nasa.api.key=${NASA_API_KEY:DEMO_KEY}
asteral.nasa.api.base-url=${NASA_API_BASE_URL:https://api.nasa.gov/neo/rest/v1}
asteral.nasa.api.connect-timeout=${NASA_CONNECT_TIMEOUT:2s}
asteral.nasa.api.read-timeout=${NASA_READ_TIMEOUT:5s}

# --- Caching Configuration ---
spring.cache.type=caffeine
spring.cache.cache-names=asteroid-feed,asteroid-details
spring.cache.caffeine.spec=recordStats,expireAfterWrite=1h,maximumSize=100

# --- Resilience4j Circuit Breaker ---
resilience4j.circuitbreaker.instances.nasaApi.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.nasaApi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.nasaApi.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.nasaApi.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.nasaApi.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.nasaApi.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.nasaApi.failureRateThreshold=50
resilience4j.circuitbreaker.instances.nasaApi.eventConsumerBufferSize=10

# --- Resilience4j Retry ---
resilience4j.retry.instances.nasaApi.maxAttempts=3
resilience4j.retry.instances.nasaApi.waitDuration=2s
resilience4j.retry.instances.nasaApi.retryExceptions=org.springframework.web.reactive.function.client.WebClientResponseException,org.springframework.web.reactive.function.client.WebClientRequestException

# --- Actuator & Observability ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.health.probes.enabled=true
management.endpoint.health.probes.add-additional-paths=true
logging.pattern.level=%5p [correlationId:%X{correlationId:-none}]

