spring.datasource.url=jdbc:h2:mem:asteral;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
asteral.nasa.api.key=test-key
asteral.nasa.api.base-url=http://localhost
asteral.nasa.api.connect-timeout=100ms
asteral.nasa.api.read-timeout=250ms
