name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: nasa_challenge
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B clean test
      # Note: Using 'test' instead of 'verify' to skip integration tests that require NASA_API_KEY
      # To run full verification with integration tests, add NASA_API_KEY to GitHub Secrets
      env:
        DB_HOST: localhost
        DB_PORT: 5433
        DB_NAME: nasa_challenge
        DB_USERNAME: postgres
        DB_PASSWORD: password
        NASA_API_KEY: ${{ secrets.NASA_API_KEY }}

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: target/surefire-reports/
        
    - name: JaCoCo Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/
