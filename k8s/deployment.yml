apiVersion: apps/v1
kind: Deployment
metadata:
  name: asteral-app
  labels:
    app: asteral
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asteral
  template:
    metadata:
      labels:
        app: asteral
    spec:
      containers:
      - name: asteral-container
        image: albonidrizi/asteral:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: postgres-service
        - name: NASA_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-secrets
              key: api-key
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: asteral-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: asteral
