services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: asteral
      DB_USERNAME: asteral
      DB_PASSWORD: ${DB_PASSWORD:?Run scripts/start-demo.ps1 or set DB_PASSWORD}
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health/readiness" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: asteral
      POSTGRES_USER: asteral
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Run scripts/start-demo.ps1 or set DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U asteral -d asteral" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
